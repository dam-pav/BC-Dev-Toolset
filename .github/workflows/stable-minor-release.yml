name: Prepare stable minor release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: stable-minor-release
  cancel-in-progress: false

jobs:
  prepare-release-pr:
    name: Prepare minor release PR
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Bump minor version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          NEXT_VERSION="$(node -e "const pkg = require('./vscode-extension/package.json'); const [major, minor] = pkg.version.split('.').map(Number); process.stdout.write([major, minor + 1, 0].join('.'));")"

          node - <<'NODE' "$NEXT_VERSION"
          const fs = require('fs');
          const packagePath = 'vscode-extension/package.json';
          const nextVersion = process.argv[2];
          const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          pkg.version = nextVersion;
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate release note proposal
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          NOTE_PATH="documentation/releases/v${VERSION}.md"
          PREVIOUS_TAG="$(git describe --tags --match 'v[0-9]*' --abbrev=0 2>/dev/null || true)"

          mkdir -p documentation/releases

          {
            echo "# BC Dev Toolset v${VERSION}"
            echo
            echo "## Highlights"
            echo
            echo "- TODO: Summarize the most important user-facing changes."
            echo
            echo "## Changes"
            echo
            if [ -n "$PREVIOUS_TAG" ]; then
              git log --first-parent --reverse --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..HEAD" || true
            else
              git log --first-parent --reverse --pretty=format:'- %s (%h)' || true
            fi
            echo
            echo
            echo "## Verification"
            echo
            echo "- [ ] Release notes reviewed and edited as needed."
            echo "- [ ] Version bump reviewed."
            echo "- [ ] Stable VSIX packaging will be verified by the publish workflow."
          } > "$NOTE_PATH"

      - name: Commit release proposal
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/v${VERSION}"

          git switch -c "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vscode-extension/package.json "documentation/releases/v${VERSION}.md"
          git commit -m "chore(release): prepare v${VERSION}"
          git push origin "$BRANCH"

      - name: Open draft release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          BODY_FILE="$(mktemp)"
          cat > "$BODY_FILE" <<EOF
          This draft PR prepares the stable minor release v${VERSION}.

          Review and edit documentation/releases/v${VERSION}.md before marking the PR ready for review.

          The stable release will be published only after this PR is approved and merged into main.
          EOF

          gh pr create \
            --base main \
            --head "release/v${VERSION}" \
            --title "Release v${VERSION}" \
            --body-file "$BODY_FILE" \
            --draft
