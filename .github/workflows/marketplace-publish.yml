name: Marketplace publish

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Version expected in vscode-extension/package.json
        required: true
        type: string
      release_kind:
        description: Marketplace channel to publish. Pre-release versions must not match a regular release version.
        required: true
        default: stable
        type: choice
        options:
          - stable
          - prerelease

permissions:
  contents: read

concurrency:
  group: marketplace-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish repository version to Marketplace
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Read extension version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -e "const pkg = require('./vscode-extension/package.json'); process.stdout.write(pkg.version);")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify requested version
        shell: bash
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          if [ "$EXPECTED_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Requested Marketplace version $EXPECTED_VERSION does not match vscode-extension/package.json version $PACKAGE_VERSION."
            exit 1
          fi

      - name: Validate extension
        shell: bash
        run: |
          set -euo pipefail

          cd vscode-extension
          npm run validate

      - name: Package VSIX from repository version
        shell: bash
        env:
          RELEASE_KIND: ${{ inputs.release_kind }}
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p dist
          cd vscode-extension
          package_args=(--out "../dist/bc-dev-toolset-${RELEASE_KIND}-${PACKAGE_VERSION}.vsix")
          if [ "$RELEASE_KIND" = "prerelease" ]; then
            package_args=(--pre-release "${package_args[@]}")
          fi

          npm run package -- "${package_args[@]}"

      - name: Publish VSIX to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          RELEASE_KIND: ${{ inputs.release_kind }}
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          prerelease_flag=""
          if [ "$RELEASE_KIND" = "prerelease" ]; then
            prerelease_flag="--pre-release"
          fi

          bash ./.github/scripts/publish-vsix-with-retry.sh \
            "dist/bc-dev-toolset-${RELEASE_KIND}-${PACKAGE_VERSION}.vsix" \
            "$prerelease_flag"
