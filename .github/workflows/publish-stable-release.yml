name: Auto - Publish stable release

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  actions: write
  contents: write

concurrency:
  group: publish-stable-release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish merged release PR
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')

    steps:
      - name: Check out released main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: Read and verify release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -e "const pkg = require('./vscode-extension/package.json'); process.stdout.write(pkg.version);")"
          EXPECTED_HEAD_REF="release/v${VERSION}"
          NOTE_PATH="documentation/releases/v${VERSION}.md"

          if [ "${{ github.event.pull_request.head.ref }}" != "$EXPECTED_HEAD_REF" ]; then
            echo "Merged release PR branch ${{ github.event.pull_request.head.ref }} does not match package version $VERSION."
            exit 1
          fi

          if [ ! -f "$NOTE_PATH" ]; then
            echo "Missing approved release notes file: $NOTE_PATH"
            exit 1
          fi

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "notes_path=$NOTE_PATH" >> "$GITHUB_OUTPUT"

      - name: Package VSIX assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          (cd vscode-extension && npm run package -- --out "../dist/bc-dev-toolset-${{ steps.version.outputs.version }}.vsix")

      - name: Promote stable branch and tag release
        shell: bash
        run: |
          set -euo pipefail

          git tag "v${{ steps.version.outputs.version }}"
          git remote set-url origin "git@github.com:${{ github.repository }}.git"
          git push --atomic origin HEAD:stable "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          gh release create "v${{ steps.version.outputs.version }}" \
            "dist/bc-dev-toolset-${{ steps.version.outputs.version }}.vsix" \
            --title "BC Dev Toolset v${{ steps.version.outputs.version }}" \
            --notes-file "${{ steps.version.outputs.notes_path }}"

      - name: Publish stable VSIX to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          set -euo pipefail

          bash ./.github/scripts/publish-vsix-with-retry.sh \
            "dist/bc-dev-toolset-${{ steps.version.outputs.version }}.vsix"

      - name: Trigger latest workflow to bump next pre-release version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          gh workflow run latest-extension.yml \
            --ref main \
            -f release_version="${{ steps.version.outputs.version }}"
